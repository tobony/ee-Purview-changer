name: release-single-file

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-windows-single-file:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish single-file exe
        run: >
          dotnet publish
          Ee.PurviewChanger.Desktop/Ee.PurviewChanger.Desktop.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableWindowsTargeting=true
          -o "${{ github.workspace }}\publish\win-x64"

      - name: Archive publish output
        shell: pwsh
        run: >
          Compress-Archive
          -Path "${{ github.workspace }}\publish\win-x64\*"
          -DestinationPath "${{ github.workspace }}\ee-purview-changer-win11-single-file-${{ github.ref_name }}.zip"
          -Force

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ github.workspace }}\ee-purview-changer-win11-single-file-${{ github.ref_name }}.zip
